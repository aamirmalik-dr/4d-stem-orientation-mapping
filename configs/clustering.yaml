# Unsupervised grain recovery: k-means on PCA pattern features, scored by
# adjusted Rand index at the true grain count and at a silhouette-selected k.
mode: clustering
name: clustering
seed: 20260718
scans_per_condition: 3
scene:
  scan_shape: [48, 48]
  n_grains: 8
  dose: 300
  mosaic_sigma: 0.3
clustering:
  k_range: [2, 16]
output: results/clustering.json
