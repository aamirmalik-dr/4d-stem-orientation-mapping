# Headline comparison at the default operating point.
# Three independent scans; template matching, CNN, and unsupervised clustering.
mode: compare
name: compare
seed: 20260718
scans_per_condition: 3
scene:
  scan_shape: [48, 48]
  n_grains: 8
  dose: 300
  mosaic_sigma: 0.3
methods: [template, cnn]
template:
  step_deg: 0.5
  refine: true
cnn:
  model: models/orientnet.pt
clustering:
  enabled: true
purity_threshold: 0.95
output: results/compare.json
