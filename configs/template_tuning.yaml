# Fair-tuning check for the classical baseline: sweep the library step and
# the sub-step parabolic refinement on the SAME fixed scans, with per-pattern
# wall-clock cost and library size, so the template matcher is compared at its
# best operating point rather than a strawman. A CNN reference row runs on the
# identical scans.
mode: template_tuning
name: template_tuning
seed: 20260718
scans_per_condition: 3
scene:
  scan_shape: [48, 48]
  n_grains: 8
  dose: 300
  mosaic_sigma: 0.3
tuning:
  steps_deg: [5.0, 2.0, 1.0, 0.5, 0.25]
  refine: [true, false]
cnn:
  model: models/orientnet.pt
purity_threshold: 0.95
output: results/template_tuning.json
